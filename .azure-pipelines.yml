# Azure DevOps Pipeline para SIGI Backend
# Buenas prácticas: cache de dependencias, build + test + cobertura, publicación de artefactos

trigger:
  branches:
    include:
      - develop
      - feature/*
      - hotfix/*

pr:
  branches:
    include:
      - develop
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  mavenCacheFolder: $(Pipeline.Workspace)/.m2/repository
  buildDir: target
  artifactName: sigi-backend

stages:
  - stage: Build
    displayName: "Compilación y pruebas"
    jobs:
      - job: BuildAndTest
        displayName: "Build + Unit Tests"
        steps:
          # Cache Maven para acelerar builds
          - task: Cache@2
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
              path: $(mavenCacheFolder)

          # Compilación y pruebas
          - task: Maven@3
            displayName: "Compilar y ejecutar pruebas"
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean verify'
              options: '-Dmaven.test.failure.ignore=false'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'

          # Publicar resultados de pruebas
          - task: PublishTestResults@2
            inputs:
              testResultsFiles: '**/target/surefire-reports/*.xml'
              testRunTitle: 'JUnit Tests'

          # Publicar cobertura JaCoCo
          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: 'JaCoCo'
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/target/site/jacoco/jacoco.xml'
              reportDirectory: '$(System.DefaultWorkingDirectory)/target/site/jacoco'
              failIfCoverageEmpty: true

          # Publicar artefactos (JAR)
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(System.DefaultWorkingDirectory)/target/*.jar'
              ArtifactName: $(artifactName)
              publishLocation: 'Container'

  - stage: Deploy_Staging
    displayName: "Despliegue en Staging"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployStaging
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Desplegando en Staging con Docker Compose..."
                  displayName: "Deploy Staging"

  - stage: Deploy_Production
    displayName: "Despliegue en Producción"
    dependsOn: Deploy_Staging
    condition: succeeded()
    jobs:
      - deployment: DeployProduction
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Desplegando en Producción con Kubernetes..."
                  displayName: "Deploy Production"
